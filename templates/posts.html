<div class="term-session">

  <div class="cmd"><span class="prompt">{{prompt}}</span> <span class="cmd-text">cd posts &amp;&amp; ls -lat</span></div>
  <div class="output">{{count}} entries, newest first.</div>

  <div class="recent-posts">
    {{posts}}
  </div>

  <div class="term-line spacer"></div>

  <div class="cmd"><span class="prompt">{{prompt}}</span> <span class="cmd-text">cd ..</span></div>
  <div class="output"><a href="/" class="back-link">← back to ~</a></div>

</div>
