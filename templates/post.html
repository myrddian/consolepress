<article class="post">
  <header class="post-header">
    <p class="post-meta">
      <span class="post-date-meta">{{date}}</span>
      <span class="tags">{{tags}}</span>
    </p>
    <h1 class="post-title">{{title}}</h1>
  </header>
  <div class="post-content">
    {{content}}
  </div>
  <footer class="post-footer">
    <a href="/" class="back-link">← back to ~</a>
  </footer>
</article>
